<!DOCTYPE html><html lang="zh-Hant"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>目光空間｜員工打卡</title><link rel="stylesheet" href="css/style.css"></head><body><header class="site-header"><div><p class="eyebrow">VisionSpace Attendance</p><h1>員工出勤打卡</h1><p class="subtitle">上班／下班打卡，系統以伺服器時間與來源 IP 紀錄。</p></div><nav><a href="index.html">手冊</a><a href="login.html">登入</a><button class="nav-button" onclick="logoutAndGo()">登出</button></nav></header><main class="single-panel" id="attendanceApp" style="display:none;"><section class="card"><h2>打卡</h2><p id="employeeInfo">讀取員工資訊中...</p><p class="hint">本版不限制公司 IP，只記錄來源 IP 供事後檢查，減少外出工地或遠端情境爭議。</p><div class="button-row"><button onclick="clockAttendance('IN')">上班打卡</button><button onclick="clockAttendance('OUT')" class="secondary">下班打卡</button></div><label>備註 note（可不填）</label><textarea id="attendanceNote" rows="4" placeholder="例如：外出工地、補登說明、特殊狀況。"></textarea><div id="attendanceStatus" class="status"></div></section><section class="card"><h2>最近打卡紀錄</h2><button class="secondary" onclick="loadMyAttendance()">重新載入</button><div id="myAttendanceList">載入中...</div></section></main><main class="single-panel" id="guardPanel"><section class="card"><h2>檢查登入狀態中...</h2><div id="guardStatus" class="status">請稍候。</div></section></main><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="js/config.js"></script><script src="js/attendance.js"></script></body></html>
