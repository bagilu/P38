<!DOCTYPE html><html lang="zh-Hant"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>目光空間｜出勤管理後台</title><link rel="stylesheet" href="css/style.css"></head><body><header class="site-header"><div><p class="eyebrow">VisionSpace Attendance Admin</p><h1>出勤管理後台</h1><p class="subtitle">出勤查詢、遲到判斷、每日摘要與 CSV 匯出。</p></div><nav><a href="index.html">手冊</a><a href="attendance.html">員工打卡</a><a href="admin.html">手冊後台</a><button class="nav-button" onclick="logoutAndGo()">登出</button></nav></header><main class="single-panel" id="guardPanel"><section class="card"><h2>檢查登入狀態中...</h2><div id="guardStatus" class="status">請稍候。</div></section></main><main class="wide-panel" id="attendanceAdminApp" style="display:none;"><section class="card"><h2>出勤紀錄查詢</h2><div class="filter-grid"><div><label>開始日期</label><input id="startDate" type="date"></div><div><label>結束日期</label><input id="endDate" type="date"></div><div><label>Email 關鍵字</label><input id="emailKeyword" placeholder="可留空"></div><div><label>上班時間標準</label><input id="workStartTime" type="time" value="09:30"></div></div><div class="button-row"><button onclick="loadAttendanceRecords()">查詢</button><button class="secondary" onclick="exportAttendanceCSV()">匯出紀錄 CSV</button><button class="secondary" onclick="exportDailySummaryCSV()">匯出每日摘要 CSV</button></div><div id="attendanceAdminStatus" class="status"></div></section><section class="card"><h2>每日摘要</h2><div class="table-wrap"><table><thead><tr><th>日期</th><th>Email</th><th>姓名</th><th>首次上班</th><th>最後下班</th><th>是否遲到</th><th>工時估算</th><th>打卡次數</th></tr></thead><tbody id="summaryTableBody"></tbody></table></div></section><section class="card"><h2>原始出勤紀錄</h2><div class="table-wrap"><table><thead><tr><th>時間</th><th>Email</th><th>姓名</th><th>類型</th><th>IP</th><th>公司網路</th><th>備註</th></tr></thead><tbody id="attendanceTableBody"></tbody></table></div></section></main><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="js/config.js"></script><script src="js/admin_attendance.js"></script></body></html>
